<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Passkey Login</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}
.card {
  background: #1c1c1e;
  padding: 30px;
  border-radius: 20px;
  width: 300px;
  text-align: center;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
}
.primary { background: #0a84ff; color: white; }
.secondary { background: #333; color: white; }
.status {
  margin-top: 15px;
  min-height: 24px;
  font-size: 14px;
}
</style>
</head>

<body>
<div class="card">
  <h2>🔐 Passkey Login</h2>
  <button class="primary" onclick="register()">Créer passkey</button>
  <button class="secondary" onclick="login()">Se connecter</button>
  <div class="status" id="status"></div>
</div>

<script>

// ✅ Padding corrigé : on retire d'abord les = existants avant de recalculer
function bufferDecode(value) {
  if (!value) return new Uint8Array();

  // ✅ Si c'est déjà un ArrayBuffer ou Uint8Array, on retourne direct
  if (value instanceof ArrayBuffer) return new Uint8Array(value);
  if (value instanceof Uint8Array)  return value;

  // ✅ Si SimpleWebAuthn renvoie { type: 'Buffer', data: [1,2,3,...] }
  if (typeof value === 'object' && value.data) {
    return new Uint8Array(value.data);
  }

  // ✅ Cas normal : string base64url
  if (typeof value === 'string') {
    const base64 = value
      .replace(/-/g, '+')
      .replace(/_/g, '/')
      .replace(/=/g, '');

    const padded = base64 + '='.repeat((4 - base64.length % 4) % 4);
    const raw = atob(padded);
    return Uint8Array.from(raw, c => c.charCodeAt(0));
  }

  // ✅ Fallback : tableau classique [1, 2, 3, ...]
  if (Array.isArray(value)) {
    return new Uint8Array(value);
  }

  throw new Error("bufferDecode : format inconnu → " + typeof value);
}

function bufferEncode(value) {
  const bytes = new Uint8Array(value);
  let str = '';
  for (let i = 0; i < bytes.length; i++) {
    str += String.fromCharCode(bytes[i]);
  }
  return btoa(str)
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=+$/, '');
}

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

// ✅ Helper fetch avec gestion d'erreur réseau propre
async function fetchJSON(url, opts = {}) {
  const res = await fetch(url, { cache: "no-store", ...opts });
  if (!res.ok) throw new Error(`Erreur serveur : ${res.status}`);
  return res.json();
}

/* ---------------- REGISTER ---------------- */
async function register() {
  try {
    setStatus("Création...");

    const options = await fetchJSON("/register-options");

    // ✅ Décode challenge et user.id
    options.challenge = bufferDecode(options.challenge);
    options.user.id   = bufferDecode(options.user.id);

    // ✅ Décode chaque excludeCredential si présent (évite les doublons)
    if (options.excludeCredentials?.length) {
      options.excludeCredentials = options.excludeCredentials.map(c => ({
        ...c,
        id: bufferDecode(c.id)
      }));
    }

    const credential = await navigator.credentials.create({ publicKey: options });

    const payload = {
      id:    credential.id,
      rawId: bufferEncode(credential.rawId),
      type:  credential.type,
      response: {
        clientDataJSON:    bufferEncode(credential.response.clientDataJSON),
        attestationObject: bufferEncode(credential.response.attestationObject)
      }
    };

    const data = await fetchJSON("/register-verify", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(payload)
    });

    setStatus(data.verified ? "✅ Passkey créée !" : "❌ Échec de l'enregistrement");

  } catch (e) {
    console.error("REGISTER:", e);
    // ✅ NotAllowedError = l'utilisateur a annulé
    if (e.name === "NotAllowedError") {
      setStatus("⚠️ Annulé par l'utilisateur");
    } else {
      setStatus("❌ " + e.message);
    }
  }
}

/* ---------------- LOGIN ---------------- */
async function login() {
  try {
    setStatus("Connexion...");

    const options = await fetchJSON("/login-options");

    options.challenge = bufferDecode(options.challenge);

    // ✅ Décode allowCredentials si présents (indispensable pour cibler le bon credential)
    if (options.allowCredentials?.length) {
      options.allowCredentials = options.allowCredentials.map(c => ({
        ...c,
        id: bufferDecode(c.id)
      }));
    }

    const assertion = await navigator.credentials.get({ publicKey: options });

    const payload = {
      id:    assertion.id,
      rawId: bufferEncode(assertion.rawId),
      type:  assertion.type,
      response: {
        authenticatorData: bufferEncode(assertion.response.authenticatorData),
        clientDataJSON:    bufferEncode(assertion.response.clientDataJSON),
        signature:         bufferEncode(assertion.response.signature),
        userHandle:        assertion.response.userHandle
                             ? bufferEncode(assertion.response.userHandle)
                             : null
      }
    };

    const data = await fetchJSON("/login-verify", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(payload)
    });

    setStatus(data.verified ? "✅ Connecté !" : "❌ Identifiant refusé");

  } catch (e) {
    console.error("LOGIN:", e);
    if (e.name === "NotAllowedError") {
      setStatus("⚠️ Annulé par l'utilisateur");
    } else {
      setStatus("❌ " + e.message);
    }
  }
}
</script>

</body>
</html>
