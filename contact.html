<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Passkey Login</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}
.card {
  background: #1c1c1e;
  padding: 30px;
  border-radius: 20px;
  width: 300px;
  text-align: center;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
}
.primary { background: #0a84ff; color: white; }
.secondary { background: #333; color: white; }
.status {
  margin-top: 15px;
  min-height: 24px;
  font-size: 14px;
}
</style>
</head>

<body>
<div class="card">
  <h2>🔐 Passkey Login</h2>

  <button class="primary" onclick="register()">Créer passkey</button>
  <button class="secondary" onclick="login()">Se connecter</button>

  <div class="status" id="status"></div>
</div>

<script>

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

function bufferDecode(value) {
  if (value instanceof ArrayBuffer) return new Uint8Array(value);
  if (value instanceof Uint8Array) return value;

  if (typeof value === "string") {
    const base64 = value.replace(/-/g, '+').replace(/_/g, '/').replace(/=/g, '');
    const padded = base64 + '='.repeat((4 - base64.length % 4) % 4);
    const raw = atob(padded);
    return Uint8Array.from(raw, c => c.charCodeAt(0));
  }

  return new Uint8Array(value);
}

function bufferEncode(value) {
  const bytes = new Uint8Array(value);
  let str = '';
  for (let i = 0; i < bytes.length; i++) {
    str += String.fromCharCode(bytes[i]);
  }
  return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function fetchJSON(url, opts = {}) {
  const res = await fetch(url, { cache: "no-store", ...opts });
  if (!res.ok) throw new Error("Erreur serveur");
  return res.json();
}

/* ---------------- REGISTER ---------------- */
async function register() {
  try {
    setStatus("Création...");

    const options = await fetchJSON("/register-options");

    options.challenge = bufferDecode(options.challenge);
    options.user.id = bufferDecode(options.user.id);

    const credential = await navigator.credentials.create({ publicKey: options });

    const payload = {
      id: credential.id,
      rawId: bufferEncode(credential.rawId),
      type: credential.type,
      response: {
        clientDataJSON: bufferEncode(credential.response.clientDataJSON),
        attestationObject: bufferEncode(credential.response.attestationObject)
      }
    };

    const data = await fetchJSON("/register-verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (data.verified) {
      setStatus("✅ Passkey créée !");

      // 💡 ESP32 LED action
      fetch("http://192.168.4.1/led/register-success");
    } else {
      setStatus("❌ Échec");
    }

  } catch (e) {
    setStatus("❌ " + e.message);
  }
}

/* ---------------- LOGIN ---------------- */
async function login() {
  try {
    setStatus("Connexion...");

    const options = await fetchJSON("/login-options");

    options.challenge = bufferDecode(options.challenge);

    const assertion = await navigator.credentials.get({ publicKey: options });

    const payload = {
      id: assertion.id,
      rawId: bufferEncode(assertion.rawId),
      type: assertion.type,
      response: {
        authenticatorData: bufferEncode(assertion.response.authenticatorData),
        clientDataJSON: bufferEncode(assertion.response.clientDataJSON),
        signature: bufferEncode(assertion.response.signature)
      }
    };

    const data = await fetchJSON("/login-verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (data.verified) {
      setStatus("✅ Connecté !");

      // 💡 ESP32 LED action
      fetch("http://192.168.4.1/led/login-success");
    } else {
      setStatus("❌ Refusé");
    }

  } catch (e) {
    setStatus("❌ " + e.message);
  }
}

</script>
</body>
</html>
