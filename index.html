<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuro Tech</title>
    <style>
        nav a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }
        nav a:hover {
            background-color: #ddd;
            color: rgb(43, 43, 43);
        }

        /* Style pour la section avec l'image de fond */
        .background-image {
            background-image: url('background.png'); /* Remplacer par le chemin de votre image */
            background-size: cover;
            background-position: center;
            height: 400px; /* Hauteur de l'image */
            width: 100%; /* L'image prend toute la largeur de la page */
            position: relative;
        }

        /* Style pour le contenu principal */
        .container {
            text-align: center;
            padding: 50px;
        }

        /* Bouton LinkedIn */
        .linkedin-button {
            margin-top: 20px;
            background-color: #0077b5;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }
        .linkedin-button:hover {
            background-color: #005582;
        }
    </style>
</head>
<body>



    <!-- Section avec l'image de fond -->
    <div class="background-image">
        <!-- Vous pouvez ajouter du contenu ici si nécessaire -->
    </div>

    <!-- Contenu principal -->
    <div class="container">
        <h1>Bienvenue sur Futuro Tech</h1>
        <p>Voici un site simple avec une navigation et un lien vers LinkedIn.</p>
        
        <!-- Lien vers LinkedIn -->
        <a href="https://www.linkedin.com/company/futuro-tech/about/?viewAsMember=true" target="_blank" class="linkedin-button">
            Mon profil LinkedIn
        </a>
    </div>

</body>
</html>
