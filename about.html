<!DOCTYPE html>
<html>
<body>

<h1>Golf AI PRO Secure System</h1>

<input id="user" placeholder="username">
<input id="pass" placeholder="password">

<button onclick="login()">Login</button>
<button onclick="startCamera()" id="camBtn" disabled>Start Camera</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<p id="status">Not logged in</p>

<script>

let token = null;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");


// 🔐 LOGIN
async function login() {

  const username = document.getElementById("user").value;
  const password = document.getElementById("pass").value;

  const res = await fetch("http://127.0.0.1:5000/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.token) {
    token = data.token;
    document.getElementById("status").innerText = "Logged in ✅";
    document.getElementById("camBtn").disabled = false;
  } else {
    document.getElementById("status").innerText = "Login failed ❌";
  }
}


// 🎥 CAMERA (BLOCKED IF NO TOKEN)
async function startCamera() {

  if (!token) {
    alert("No access");
    return;
  }

  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  setInterval(sendFrame, 1000);
}


// 📡 SEND FRAME TO PYTHON
async function sendFrame() {

  if (!token) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const image = canvas.toDataURL("image/jpeg");

  const res = await fetch("http://127.0.0.1:5000/process", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      token,
      image
    })
  });

  const data = await res.json();

  if (!data.access) {
    document.getElementById("status").innerText = "Unauthorized ❌";
    return;
  }

  document.getElementById("status").innerText =
    `User: ${data.user} | Faces: ${data.faces}`;
}

</script>

</body>
</html>
