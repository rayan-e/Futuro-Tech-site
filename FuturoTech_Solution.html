<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuro Tech</title>
    <style>
        /* Style pour le menu de navigation */
        nav {
            background-color: #2c436f9f;
            overflow: hidden;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            transition: background-color 0.3s;
        }

        nav a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 15px;
            text-decoration: none;
            float: left;
        }

        nav a:hover {
            background-color: #ddd;
            color: black;
        }

        .menu-icon {
            display: none;
            float: right;
            padding: 14px 20px;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-links.active {
            display: flex;
            flex-direction: column;
        }

        /* Style pour le diaporama en background */
        .slideshow-container {
            position: relative;
            height: 400px;
            width: 100%;
            background-size: cover;
            background-position: center;
            margin-top: 50px;
            animation: fade 5s infinite;
        }

        @keyframes fade {
            0% { background-image: url('slide1.png'); }
            33% { background-image: url('slide2.png'); }
            66% { background-image: url('slide3.png'); }
            100% { background-image: url('slide1.png'); }
        }

        /* Style pour les images supplémentaires */
        .image-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 50px 0;
        }

        .image-wrapper {
            position: relative;
            width: 30%;
        }

        .additional-image {
            width: 100%;
            height: auto;
            transition: transform 0.3s;
        }

        .additional-image:hover {
            transform: scale(1.05);
        }

        .discover-button {
            display: none;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #2c436f;
            color: white;
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
        }

        .image-wrapper:hover .discover-button {
            display: block;
        }

        /* Styles spécifiques pour les smartphones */
        @media (max-width: 768px) {
            nav a {
                display: none;
                float: none;
            }

            .menu-icon {
                display: block;
            }

            .nav-links {
                display: none;
                flex-direction: column;
                width: 100%;
                background-color: #005582;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links a {
                display: block;
                padding: 10px 0;
                text-align: center;
            }

            /* Adapter les images supplémentaires pour mobile */
            .image-wrapper {
                width: 90%;
            }

            /* Réduire la hauteur du diaporama pour mobile */
            .slideshow-container {
                height: 200px;
            }
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
    </style>
</head>

<body>

    <!-- Menu de navigation -->
    <nav id="navbar">
        <span class="menu-icon" onclick="toggleMenu()">&#9776;</span>
        <div class="nav-links" id="nav-links">
            <a href="index.html" onclick="closeMenu()">Accueil</a>
            <a href="contact.html" onclick="closeMenu()">Contact</a>
            <a href="about.html" onclick="closeMenu()">À propos</a>
            <a href="FuturoTech_Solution.html" onclick="closeMenu()">Futuro Tech Solution</a>
            <a href="FuturoTech_Automative.html" onclick="closeMenu()">Futuro Tech Automative</a>
            <a href="FuturoTech_Accessoires.html" onclick="closeMenu()">Futuro Tech Accessoires</a>
        </div>
    </nav>

    <!-- Diaporama automatique en arrière-plan -->
    <div class="slideshow-container"></div>

    <!-- Trois images avec boutons découvrir -->
    <div class="image-container">
        <div class="image-wrapper">
            <img src="imagefs1.png" alt="Image 1" class="additional-image">
            <a href="SystemeAnti_incendie.html" class="discover-button">Découvrir</a>
        </div>
        <div class="image-wrapper">
            <img src="imagefs2.png" alt="Image 2" class="additional-image">
            <a href="FuturoTech_Solution.html" class="discover-button">Découvrir</a>
        </div>
        <div class="image-wrapper">
            <img src="imagefs3.png" alt="Image 3" class="additional-image">
            <a href="FuturoTech_Solution.html" class="discover-button">Découvrir</a>
        </div>
    </div>

    <!-- Script pour basculer le menu burger et fermer après un clic -->
    <script>
        function toggleMenu() {
            const navLinks = document.getElementById('nav-links');
            navLinks.classList.toggle('active');
        }

        function closeMenu() {
            const navLinks = document.getElementById('nav-links');
            navLinks.classList.remove('active');
        }
    </script>

</body>

</html>
